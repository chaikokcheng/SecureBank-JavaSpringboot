# Application Configuration
spring.application.name=SecureBank

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/securebank
spring.datasource.username=chaikokcheng
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.secret=SecureBankSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong!
jwt.expiration=86400000

# Server Configuration
server.port=8080
