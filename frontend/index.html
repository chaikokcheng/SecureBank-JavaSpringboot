<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SecureBank - Digital Banking</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-container">
      <!-- Auth Section -->
      <div id="auth-section" class="section">
        <div class="auth-card">
          <div class="logo">
            <div class="logo-icon">🏦</div>
            <h1>SecureBank</h1>
            <p class="tagline">Digital Banking Made Simple</p>
          </div>

          <!-- Login Form -->
          <div id="login-form" class="form-container">
            <h2>Welcome Back</h2>
            <form onsubmit="handleLogin(event)">
              <div class="input-group">
                <label for="login-email">Email</label>
                <input
                  type="email"
                  id="login-email"
                  placeholder="Enter your email"
                  required
                />
              </div>
              <div class="input-group">
                <label for="login-password">Password</label>
                <input
                  type="password"
                  id="login-password"
                  placeholder="Enter your password"
                  required
                />
              </div>
              <button type="submit" class="btn btn-primary">Sign In</button>
            </form>
            <p class="switch-form">
              Don't have an account?
              <a href="#" onclick="showRegister()">Register</a>
            </p>
          </div>

          <!-- Register Form -->
          <div id="register-form" class="form-container hidden">
            <h2>Create Account</h2>
            <form onsubmit="handleRegister(event)">
              <div class="input-row">
                <div class="input-group">
                  <label for="register-firstname">First Name</label>
                  <input
                    type="text"
                    id="register-firstname"
                    placeholder="John"
                    required
                  />
                </div>
                <div class="input-group">
                  <label for="register-lastname">Last Name</label>
                  <input
                    type="text"
                    id="register-lastname"
                    placeholder="Doe"
                    required
                  />
                </div>
              </div>
              <div class="input-group">
                <label for="register-email">Email</label>
                <input
                  type="email"
                  id="register-email"
                  placeholder="john@example.com"
                  required
                />
              </div>
              <div class="input-group">
                <label for="register-password">Password</label>
                <input
                  type="password"
                  id="register-password"
                  placeholder="Min 6 characters"
                  required
                  minlength="6"
                />
              </div>
              <button type="submit" class="btn btn-primary">
                Create Account
              </button>
            </form>
            <p class="switch-form">
              Already have an account?
              <a href="#" onclick="showLogin()">Sign In</a>
            </p>
          </div>
        </div>
      </div>

      <!-- Dashboard Section -->
      <div id="dashboard-section" class="section hidden">
        <header class="dashboard-header">
          <div class="header-left">
            <span class="logo-small">🏦</span>
            <span class="brand">SecureBank</span>
          </div>
          <div class="header-right">
            <span id="user-name" class="user-name"></span>
            <button class="btn btn-outline" onclick="logout()">Logout</button>
          </div>
        </header>

        <main class="dashboard-main">
          <!-- Balance Card -->
          <div class="balance-card">
            <div class="balance-info">
              <p class="balance-label">Available Balance</p>
              <h2 class="balance-amount" id="balance-amount">$0.00</h2>
              <p class="account-number" id="account-number">Account: ---</p>
            </div>
            <div class="balance-actions">
              <button class="btn btn-glass" onclick="refreshBalance()">
                <span>🔄</span> Refresh
              </button>
            </div>
          </div>

          <!-- Transfer Section -->
          <div class="card transfer-card">
            <h3>💸 Send Money</h3>
            <form onsubmit="handleTransfer(event)">
              <div class="input-group">
                <label for="transfer-to">Recipient Account Number</label>
                <input
                  type="text"
                  id="transfer-to"
                  placeholder="e.g., ACC1234567890"
                  required
                />
              </div>
              <div class="input-group">
                <label for="transfer-amount">Amount ($)</label>
                <input
                  type="number"
                  id="transfer-amount"
                  placeholder="0.00"
                  step="0.01"
                  min="0.01"
                  required
                />
              </div>
              <div class="input-group">
                <label for="transfer-description">Description (optional)</label>
                <input
                  type="text"
                  id="transfer-description"
                  placeholder="e.g., Lunch payment"
                />
              </div>
              <button type="submit" class="btn btn-primary">Send Money</button>
            </form>
          </div>

          <!-- Transaction History -->
          <div class="card history-card">
            <div class="card-header">
              <h3>📜 Transaction History</h3>
              <button class="btn btn-small" onclick="loadHistory()">
                Refresh
              </button>
            </div>
            <div id="transaction-list" class="transaction-list">
              <p class="empty-state">No transactions yet</p>
            </div>
          </div>
        </main>
      </div>

      <!-- Toast Notification -->
      <div id="toast" class="toast hidden">
        <span id="toast-message"></span>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
